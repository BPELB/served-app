<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>franklyy</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
    <style>
      :root {
        --bg: #26373f; --bg2: #1c2b31; --bg3: #1a2830;
        --bdr: #4a6270; --text: #ffffff;
        --muted: rgba(255,255,255,0.55); --hover: #243840;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { background: var(--bg); min-height: 100%; }
      body { font-family: 'Sora', sans-serif; font-weight: 700; color: var(--text); }
      input, textarea, button, select { font-family: inherit; font-weight: 600; font-size: 16px; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #e05535; border-radius: 2px; }
      input::placeholder { color: var(--muted); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
